name: CD Pipeline

on:
  push:
    branches: [main]
    tags: ['v*.*.*']

permissions:
  contents: write
  packages: write

jobs:
  # --------------------------------------------------------
  # STAGING ENVIRONMENT (Trigger khi merge vào main)
  # --------------------------------------------------------
  get-sha:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      sha_short: ${{ steps.vars.outputs.sha_short }}
    steps:
      - uses: actions/checkout@v4
      - id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

  build-staging:
    needs: get-sha
    uses: ./.github/workflows/reusable-build.yml
    with:
      image_name: demo-app
      image_tag: sha-${{ needs.get-sha.outputs.sha_short }}
    secrets:
      registry_password: ${{ secrets.GITHUB_TOKEN }}

  deploy-staging:
    needs: build-staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Deploy to Staging Server
        run: |
          echo "Simulating SSH to Staging VM..."
          echo "Deploying image demo-app:sha-${{ needs.get-sha.outputs.sha_short }} successfully!"

  # --------------------------------------------------------
  # PRODUCTION ENVIRONMENT (Trigger khi push Tag v*.*.*)
  # --------------------------------------------------------
  build-production:
    if: startsWith(github.ref, 'refs/tags/v')
    uses: ./.github/workflows/reusable-build.yml
    with:
      image_name: demo-app
      image_tag: ${{ github.ref_name }}
    secrets:
      registry_password: ${{ secrets.GITHUB_TOKEN }}

  deploy-production:
    needs: build-production
    runs-on: ubuntu-latest
    environment: production # Kích hoạt Block Gate Chờ Approval từ repo settings
    steps:
      - name: Deploy to Production Server
        run: |
          echo "Simulating Production Deployment..."
          echo "Executing zero-downtime rolling update for version ${{ github.ref_name }}"

  create-release:
    needs: deploy-production
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate Automatic GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true # Tự động tạo changelog từ PR/Commit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}