name: CD Simulation

on:
  push:
    branches: [main]
    tags: ['v*.*.*']

permissions:
  contents: write
  packages: write

jobs:
  # --------------------------------------------------------
  # STAGING ENVIRONMENT (Trigger khi merge vào main)
  # --------------------------------------------------------
  # Lấy SHA rút gọn của commit hiện tại để dùng làm image tag cho staging.
  get-sha:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      sha_short: ${{ steps.vars.outputs.sha_short }}
    steps:
      - uses: actions/checkout@v4
      - id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

  # Triển khai image staging dựa trên SHA đã lấy ở job trước.
  deploy-staging:
    needs: get-sha
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Deploy to Staging Server
        run: |
          echo "Simulating SSH to Staging VM..."
          echo "Deploying image demo-app:sha-${{ needs.get-sha.outputs.sha_short }} successfully!"

  # --------------------------------------------------------
  # PRODUCTION ENVIRONMENT (Trigger khi push Tag v*.*.*)
  # --------------------------------------------------------
  # Tạo GitHub Release tự động sau khi QA test trên Staging thành công.
  # Triển khai production khi có tag release theo chuẩn v*.*.*.
  create-release:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate Automatic GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true # Tự động tạo changelog từ PR/Commit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-production:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: production # Kích hoạt Block Gate Chờ Approval từ repo settings
    steps:
      - name: Deploy to Production Server
        run: |
          echo "Simulating Production Deployment..."
          echo "Executing zero-downtime rolling update for version ${{ github.ref_name }}"
